<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance Scanner</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>📷 Attendance Scanner</h1>

        <label for="scannerSelect">Select Scanner</label>

        <select id="scannerSelect">
            <option value="">Choose Scanner</option>
            <option>Sandy</option>
            <option>Makarious</option>
        </select>

        <button id="startBtn">
            Start Scanner
        </button>

        <div id="reader"></div>

        <div id="message">
            Ready
        </div>

    </div>

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- API Functions -->
    <script src="api.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>

</body>

</html>
